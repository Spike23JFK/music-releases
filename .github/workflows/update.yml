name: Update Music Releases

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour
  workflow_dispatch:        # lets you trigger it manually from GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test coreradio RSS access
        run: |
          echo "--- Testing coreradio RSS ---"
          curl -s -o /tmp/rss_test.txt -w "HTTP %{http_code} | Size: %{size_download} bytes\n" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://coreradio.online/rss.xml
          head -3 /tmp/rss_test.txt

      - name: Run scraper
        run: python music_releases.py --output index.html --max 100

      - name: Commit and push updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update releases $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
